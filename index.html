<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grace Path Church | UI Test</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="ref-header">
      <div class="ref-container">
        <div class="ref-top-row">
          <a class="ref-logo" href="./index.html"><img src="./assets/images/yadam_logo.png" alt="예닮교회 로고" /></a>
          <nav class="ref-main-nav" aria-label="main navigation">
            <a href="./about.html" data-menu="about">교회소개</a>
            <a href="./ministries.html" data-menu="ministries">사역소개</a>
            <a href="./news.html" data-menu="news">교회소식</a>
            <a href="./gallery.html" data-menu="gallery">갤러리</a>
            <a href="./contact.html" data-menu="contact">문의하기</a>
          </nav>
          <a class="ref-cta" href="./location.html">오시는길</a>
        </div>
      </div>
    </header>

    <main class="ref-container">
      <section class="ref-prehero">
        <div class="ref-submenu-panel">
          <div class="ref-sub-row">
            <a href="./about.html">교회소개</a>
            <a href="./ministries.html">사역소개</a>
            <a href="./news.html">교회소식</a>
          </div>
        </div>
        <div class="ref-hero-meta">
          <span>∴</span>
          <span>예닮교회, 2025</span>
          <span class="rights">All Rights Reserved</span>
        </div>
      </section>

      <section class="ref-hero">
        <h1 class="verse-title">
          그 작은 자가 천을 이루겠고 그 약한 자가<br />
          강국을 이룰 것이라 때가 되면 나 여호와가 속히 이루리라<br />
          이사야 60:22
        </h1>
      </section>

      <section class="ref-card-image">
        <div class="ref-pill-bg" aria-hidden="true"></div>
        <img
          src="./assets/images/main_img.png"
          alt="메인 이미지"
        />
      </section>

      <section class="ref-trusted">
        <p class="ref-kicker">Trusted by</p>
        <div class="ref-logos">
          <span>logi</span>
          <span>Logipsum</span>
          <span>✦</span>
          <span>Logipsum</span>
          <span>LOREM&NUY</span>
          <span class="logo-pill">logipsum</span>
        </div>
      </section>

      <section class="ref-main-boards">
        <div class="home-board-table" data-home-board-table data-board-limit="5">
          <div class="home-board-split">
            <section class="home-board-panel">
              <header class="home-board-panel-head">
                <h3 data-board-title="notice">공지사항</h3>
                <a href="./notice.html" data-board-more="notice">전체보기</a>
              </header>
              <ul class="home-board-body" data-home-board-body="notice"></ul>
            </section>
            <section class="home-board-panel">
              <header class="home-board-panel-head">
                <h3 data-board-title="news">교회 소식</h3>
                <a href="./news.html" data-board-more="news">전체보기</a>
              </header>
              <ul class="home-board-body" data-home-board-body="news"></ul>
            </section>
          </div>
        </div>
      </section>

      <section class="ref-large-image">
        <img
          src="https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1600&q=80"
          alt="Mountain range sample"
        />
      </section>
    </main>
    <script src="./content-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
